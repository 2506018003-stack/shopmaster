<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShopMaster</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #f4a261;
            --primary-dark: #e76f51;
            --secondary: #2a9d8f;
            --bg: #faf9f6;
            --surface: #ffffff;
            --text: #2b2d42;
            --text-light: #8d99ae;
            --border: #e5e7eb;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 20px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 90px; }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 24px 20px;
            border-radius: 0 0 var(--radius) var(--radius);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header p { opacity: 0.9; font-size: 14px; margin-top: 4px; }

        .search-box { margin: 16px 20px; position: relative; }
        .search-box input {
            width: 100%; padding: 14px 20px 14px 48px; border: none; border-radius: var(--radius);
            background: var(--surface); box-shadow: var(--shadow); font-size: 16px; outline: none;
        }
        .search-box::before { content: "🔍"; position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 16px; }

        .categories { display: flex; gap: 12px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .category-chip {
            background: var(--surface); border: 2px solid transparent; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; font-weight: 600; white-space: nowrap;
            cursor: pointer; box-shadow: var(--shadow); transition: all 0.2s;
        }
        .category-chip.active { border-color: var(--primary); color: var(--primary); background: rgba(244, 162, 97, 0.1); }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 20px; }
        .product-card {
            background: var(--surface); border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow); transition: transform 0.2s;
        }
        .product-card:active { transform: scale(0.98); }
        .product-img { width: 100%; height: 160px; object-fit: cover; background: linear-gradient(135deg, #f0f0f0, #e0e0e0); }
        .product-info { padding: 16px; }
        .product-name { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { color: var(--primary); font-size: 18px; font-weight: 700; }
        .product-stock { font-size: 12px; color: var(--text-light); margin-top: 4px; }
        .add-btn {
            width: 100%; margin-top: 12px; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .add-btn:active { background: var(--primary-dark); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
            display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08); border-radius: var(--radius) var(--radius) 0 0; z-index: 100;
        }
        .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-light); font-size: 11px; cursor: pointer; position: relative; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn .icon { font-size: 24px; }
        .nav-btn .badge { position: absolute; top: -4px; right: -4px; background: #e76f51; color: white;
            font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; }

        .page { display: none; }
        .page.active { display: block; }

        .cart-item { display: flex; gap: 16px; background: var(--surface); padding: 16px; border-radius: var(--radius); margin: 0 20px 12px; box-shadow: var(--shadow); }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
        .qty-control { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
        .qty-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg);
            font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .checkout-btn { margin: 20px; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; border-radius: var(--radius); font-size: 18px; font-weight: 700;
            cursor: pointer; width: calc(100% - 40px); box-shadow: var(--shadow); }

        .order-card { background: var(--surface); padding: 20px; border-radius: var(--radius); margin: 0 20px 12px; box-shadow: var(--shadow); }
        .status-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #e0e7ff; color: #3730a3; }
        .status-delivered { background: #d1fae5; color: #065f46; }

        .promo-input { display: flex; gap: 8px; margin: 0 20px 16px; }
        .promo-input input { flex: 1; padding: 14px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; outline: none; }
        .promo-input input:focus { border-color: var(--primary); }
        .promo-input button { padding: 14px 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .discount-row { display: flex; justify-content: space-between; padding: 8px 20px; color: var(--success); font-weight: 600; }
        .final-row { display: flex; justify-content: space-between; padding: 12px 20px; font-size: 20px; font-weight: 800; border-top: 2px solid var(--border); margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ShopMaster</h1>
        <p>Магазин в Telegram</p>
    </div>

    <div id="page-catalog" class="page active">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Поиск товаров..." oninput="searchProducts()">
        </div>
        <div class="categories" id="categories"></div>
        <div class="products-grid" id="products-grid"></div>
    </div>

    <div id="page-cart" class="page">
        <div id="cart-items" style="margin-top: 20px;"></div>
        <div id="cart-empty" style="text-align: center; padding: 60px 20px; color: var(--text-light); display: none;">
            <div style="font-size: 48px; margin-bottom: 16px;">🛒</div>
            <p>Ваша корзина пуста</p>
        </div>
        <div id="cart-promo" class="promo-input" style="display: none;">
            <input type="text" id="promo-code" placeholder="Введите промокод">
            <button onclick="applyPromo()">Применить</button>
        </div>
        <div id="cart-discount" class="discount-row" style="display: none;"></div>
        <div id="cart-footer" style="display: none;">
            <div class="final-row">
                <span>Итого</span>
                <span id="cart-total" style="color: var(--primary);">0</span> ₽
            </div>
            <button class="checkout-btn" onclick="showCheckout()">Оформить заказ</button>
        </div>
    </div>

    <div id="page-orders" class="page">
        <div id="orders-list" style="margin-top: 20px;"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="showPage('catalog')">
            <span class="icon">🛍</span>
            <span>Каталог</span>
        </button>
        <button class="nav-btn" onclick="showPage('cart')">
            <span class="icon">🛒</span>
            <span>Корзина</span>
            <span class="badge" id="cart-badge" style="display: none;">0</span>
        </button>
        <button class="nav-btn" onclick="showPage('orders')">
            <span class="icon">📦</span>
            <span>Заказы</span>
        </button>
    </nav>

    <script>
        const API_URL = window.location.origin;
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#f4a261');
        tg.setBackgroundColor('#faf9f6');

        let products = [];
        let cart = JSON.parse(localStorage.getItem('sm_cart') || '[]');
        let appliedPromo = JSON.parse(localStorage.getItem('sm_promo') || 'null');

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (page === 'catalog') loadProducts();
            if (page === 'cart') renderCart();
            if (page === 'orders') loadOrders();
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/products/`);
                products = await res.json();
                renderCategories();
                renderProducts(products);
            } catch (e) { tg.showAlert('Ошибка загрузки каталога'); }
        }

        function renderCategories() {
            const cats = [...new Set(products.map(p => p.category?.name).filter(Boolean))];
            const html = cats.map((cat, i) => 
                `<button class="category-chip ${i === 0 ? 'active' : ''}" onclick="filterCategory('${cat}', this)">${cat}</button>`
            ).join('');
            document.getElementById('categories').innerHTML = html;
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(products.filter(p => p.category?.name === cat));
        }

        function renderProducts(list) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = list.map(p => {
                const available = p.stock - p.reserved;
                return `
                    <div class="product-card">
                        <img src="${p.image_url || 'https://via.placeholder.com/300'}" class="product-img" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${p.price} ₽</div>
                            <div class="product-stock">В наличии: ${available} шт.</div>
                            <button class="add-btn" onclick="addToCart(${p.id})" ${available <= 0 ? 'disabled style="opacity:0.5"' : ''}>
                                ${available > 0 ? '🛒 В корзину' : '❌ Нет в наличии'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const available = product.stock - product.reserved;
            const existing = cart.find(c => c.id === id);
            if (existing && existing.qty >= available) { tg.showAlert('Достигнут лимит'); return; }
            if (existing) existing.qty++; else cart.push({...product, qty: 1});
            saveCart();
            tg.HapticFeedback.impactOccurred('light');
            tg.showAlert('Добавлено в корзину!');
        }

        function saveCart() {
            localStorage.setItem('sm_cart', JSON.stringify(cart));
            updateBadge();
        }

        function updateBadge() {
            const badge = document.getElementById('cart-badge');
            const total = cart.reduce((s, i) => s + i.qty, 0);
            badge.textContent = total;
            badge.style.display = total > 0 ? 'flex' : 'none';
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const empty = document.getElementById('cart-empty');
            const footer = document.getElementById('cart-footer');
            const promoDiv = document.getElementById('cart-promo');
            const discountDiv = document.getElementById('cart-discount');

            if (!cart.length) {
                container.innerHTML = ''; empty.style.display = 'block'; footer.style.display = 'none';
                promoDiv.style.display = 'none'; discountDiv.style.display = 'none'; return;
            }

            empty.style.display = 'none'; footer.style.display = 'block'; promoDiv.style.display = 'flex';

            container.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <img src="${item.image_url || 'https://via.placeholder.com/100'}">
                    <div style="flex: 1;">
                        <div style="font-weight: 600; margin-bottom: 4px;">${item.name}</div>
                        <div style="color: var(--primary); font-weight: 700;">${(item.price * item.qty).toFixed(2)} ₽</div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateQty(${i}, -1)">−</button>
                            <span style="font-weight: 700; min-width: 24px; text-align: center;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${i}, 1)">+</button>
                        </div>
                    </div>
                </div>
            `).join('');

            updateCartTotal();
        }

        function updateQty(i, delta) {
            cart[i].qty += delta;
            if (cart[i].qty <= 0) cart.splice(i, 1);
            saveCart(); renderCart();
        }

        async function applyPromo() {
            const code = document.getElementById('promo-code').value.trim().toUpperCase();
            if (!code) return;

            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            try {
                const res = await fetch(`${API_URL}/promo/validate`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code, order_total: total})
                });
                const result = await res.json();

                if (result.valid) {
                    appliedPromo = {code, discount: result.discount_amount};
                    localStorage.setItem('sm_promo', JSON.stringify(appliedPromo));
                    updateCartTotal();
                    tg.showAlert(`Промокод применён! Скидка: ${result.discount_amount} ₽`);
                } else {
                    tg.showAlert(result.message);
                }
            } catch (e) { tg.showAlert('Ошибка применения промокода'); }
        }

        function updateCartTotal() {
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let discount = 0;
            if (appliedPromo) {
                discount = appliedPromo.discount;
                document.getElementById('cart-discount').style.display = 'flex';
                document.getElementById('cart-discount').innerHTML = `<span>Промокод ${appliedPromo.code}</span><span>-${discount.toFixed(0)} ₽</span>`;
            } else {
                document.getElementById('cart-discount').style.display = 'none';
            }
            const final = Math.max(subtotal - discount, 0);
            document.getElementById('cart-total').textContent = final.toFixed(0);
        }

        function showCheckout() {
            if (!cart.length) return;
            tg.MainButton.setText('Оформить заказ');
            tg.MainButton.show();
            tg.MainButton.onClick(async () => {
                const user = tg.initDataUnsafe.user;
                const res = await fetch(`${API_URL}/orders/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: user?.id,
                        items: cart.map(c => ({id: c.id, qty: c.qty})),
                        init_data: tg.initData,
                        promo_code: appliedPromo?.code
                    })
                });
                if (res.ok) {
                    cart = []; appliedPromo = null;
                    localStorage.removeItem('sm_cart'); localStorage.removeItem('sm_promo');
                    tg.showAlert('Заказ оформлен!'); showPage('orders');
                }
                tg.MainButton.hide();
            });
        }

        async function loadOrders() {
            const user = tg.initDataUnsafe.user;
            if (!user) return;
            try {
                const res = await fetch(`${API_URL}/orders/?user_id=${user.id}`);
                const orders = await res.json();
                const container = document.getElementById('orders-list');
                container.innerHTML = orders.map(o => `
                    <div class="order-card">
                        <span class="status-badge status-${o.status}">${getStatusText(o.status)}</span>
                        <div style="font-weight: 700; font-size: 18px; margin-bottom: 8px;">Заказ #${o.id}</div>
                        <div style="color: var(--text-light); font-size: 14px; margin-bottom: 12px;">${new Date(o.created_at).toLocaleString('ru-RU')}</div>
                        <div style="font-weight: 700; color: var(--primary); font-size: 20px;">${o.final_amount} ₽</div>
                        ${o.discount_amount > 0 ? `<div style="color: var(--success); font-size: 14px;">Скидка: ${o.discount_amount} ₽</div>` : ''}
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function getStatusText(s) {
            const map = {pending: '⏳ Ожидает', processing: '📦 В обработке', shipped: '🚚 Отправлен', delivered: '✅ Доставлен'};
            return map[s] || s;
        }

        function searchProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(q)));
        }

        updateBadge();
        loadProducts();
    </script>
</body>
</html>
