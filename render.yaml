services:
  - type: web
    name: shopmaster-api
    env: python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "7804481895"
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./shopmaster.db"
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      - key: WEBAPP_URL
        value: https://telegram-autoposter-z0dw.onrender.com/miniapp
      - key: CRM_URL
        value: https://telegram-autoposter-z0dw.onrender.com/crm
      - key: PAYMENT_PROVIDER_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DEBUG
        value: "true"

  - type: worker
    name: shopmaster-bot
    env: python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "7804481895"
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./shopmaster.db"
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
