services:
  - type: web
    name: shopmaster-api
    env: python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "7804481895"
      - key: DATABASE_URL
        fromDatabase:
          name: shopmaster-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: shopmaster-redis
          property: connectionString
      - key: WEBAPP_URL
        value: https://telegram-autoposter-z0dw.onrender.com/miniapp
      - key: CRM_URL
        value: https://telegram-autoposter-z0dw.onrender.com/crm
      - key: PAYMENT_PROVIDER_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DEBUG
        value: "true"
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: shopmaster-bot
    env: python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "7804481895"
      - key: DATABASE_URL
        fromDatabase:
          name: shopmaster-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: shopmaster-redis
          property: connectionString

  - type: redis
    name: shopmaster-redis
    ipAllowList: []

databases:
  - name: shopmaster-db
    databaseName: shopmaster
    user: shopmaster
