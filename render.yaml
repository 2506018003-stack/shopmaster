services:
  - type: web
    name: shopmaster-api
    env: docker
    dockerCommand: uvicorn api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ADMIN_IDS
        value: "7804481895"
      - key: WEBAPP_URL
        value: "https://shopmaster-c3oo.onrender.com/miniapp"
      - key: CRM_URL
        value: "https://shopmaster-c3oo.onrender.com/crm"
      - key: WEBHOOK_SECRET
        value: "rx13r2xr2"
      - key: DEBUG
        value: "true"
      # Следующие ключи не будут перезаписываться при деплое, 
      # их нужно будет вставить вручную в панели Render:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PAYMENT_PROVIDER_TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false

  - type: worker
    name: shopmaster-bot
    env: docker
    dockerCommand: python -m bot.main
    envVars:
      - key: ADMIN_IDS
        value: "7804481895"
      - key: WEBAPP_URL
        value: "https://shopmaster-c3oo.onrender.com/miniapp"
      - key: CRM_URL
        value: "https://shopmaster-c3oo.onrender.com/crm"
      - key: DEBUG
        value: "true"
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PAYMENT_PROVIDER_TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false